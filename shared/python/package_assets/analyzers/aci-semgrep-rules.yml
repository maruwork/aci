rules:
  - id: aci.ci14.unsafe-yaml-load
    languages: [python]
    severity: ERROR
    message: Untrusted YAML should not be loaded with yaml.load without SafeLoader.
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader, ...)
  - id: aci.ci14.pickle-load
    languages: [python]
    severity: ERROR
    message: Pickle-style deserialization can execute attacker-controlled payloads.
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
      - pattern: dill.load(...)
      - pattern: dill.loads(...)
      - pattern: marshal.load(...)
      - pattern: marshal.loads(...)
  - id: aci.ci22.fire-and-forget-task
    languages: [python]
    severity: WARNING
    message: Fire-and-forget asyncio.create_task can leak work beyond the owning boundary.
    pattern-either:
      - pattern: asyncio.create_task(...)
      - pattern: $LOOP.create_task(...)
  - id: aci.ci23.js-eval
    languages: [javascript, typescript]
    severity: ERROR
    message: Dynamic code execution weakens auditability and expands the attack surface.
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)
  - id: aci.ci21.silent-shell-continue
    languages: [bash]
    severity: WARNING
    message: Shell commands should not silently swallow failures through unconditional fallback.
    pattern: $CMD || true
  - id: aci.ci26.world-writeable-container
    languages: [dockerfile]
    severity: WARNING
    message: World-writable container paths expand mutation and race surfaces.
    pattern-either:
      - pattern: RUN chmod 777 ...
      - pattern: RUN chmod -R 777 ...
  # Multi-language source -> sink taint (G3)
  - id: aci.ci14.taint-js-code-injection
    mode: taint
    languages: [javascript, typescript]
    severity: ERROR
    message: Untrusted request input flows into a JavaScript code-execution sink (taint).
    pattern-sources:
      - pattern: $REQ.query
      - pattern: $REQ.body
      - pattern: $REQ.params
      - pattern: process.argv
    pattern-sinks:
      - pattern: eval(...)
      - pattern: new Function(...)
  - id: aci.ci14.taint-py-code-injection
    mode: taint
    languages: [python]
    severity: ERROR
    message: Untrusted input flows into a Python code-execution sink (taint).
    pattern-sources:
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: flask.request.args.get(...)
      - pattern: input(...)
    pattern-sinks:
      - pattern: eval(...)
      - pattern: exec(...)
      - pattern: os.system(...)
  - id: aci.ci14.taint-go-command-injection
    mode: taint
    languages: [go]
    severity: ERROR
    message: Untrusted input flows into a Go command-execution sink (taint).
    pattern-sources:
      - pattern: $R.URL.Query().Get(...)
      - pattern: $R.FormValue(...)
      - pattern: os.Args
    pattern-sinks:
      - pattern: exec.Command(...)
