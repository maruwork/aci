name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and analyzer dependencies
        run: |
          pip install setuptools==79.0.1
          pip install -e .
          pip install -r requirements-dev-analyzers.txt

      # Design methodology ops (achievable layer): Gate-0 silence ban, Gate-1 thin
      # evidence/oracle slice, named seams, residual honesty, Gate-R recirculation.
      # Does not claim perfect design or zero bugs.
      - name: Design methodology ops check
        run: python shared/tools/aci_design_methodology_check.py --root .

      - name: Install multi-language analyzers (Linux)
        # These analyzers are not in the pinned pure-Python requirements set, but
        # installing them on Linux makes the multi-language external-analyzer e2e
        # tests actually run, proving the orchestration end-to-end rather than only
        # at parser level. semgrep (multi-language SAST), sqlfluff (SQL) via pip;
        # eslint + tsc (JS/TS) via npm. shellcheck is preinstalled on ubuntu-latest.
        # Binary-only tools (gitleaks/trivy/osv-scanner) are proven locally; their
        # e2e tests skip here until a release-binary install step is added.
        run: |
          pip install semgrep sqlfluff
          npm install -g eslint typescript

      - name: Install binary security analyzers (Linux)
        # gitleaks (secrets), trivy (deps/vuln), osv-scanner (deps) ship as release
        # binaries; installing them lets their live e2e tests run in CI too.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          sudo curl -sSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          sudo chmod +x /usr/local/bin/osv-scanner
          GL_URL=$(curl -sSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -o '"browser_download_url": *"[^"]*linux_x64.tar.gz"' | head -1 | cut -d'"' -f4)
          curl -sSL "$GL_URL" | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Run test suite
        run: pytest shared/tests/ -v

      - name: Lint (ruff)
        run: ruff check shared/python/ shared/tests/ shared/tools/

      - name: Type check (mypy)
        # Gating. Config in pyproject.toml ([tool.mypy]) disables the [no-redef]
        # noise from the intentional dual-import idiom; all other type errors fail
        # the build.
        run: mypy shared/python/

      - name: ACI automation smoke
        run: aci automation-smoke

      - name: ACI self-audit surface check
        run: aci self-audit-check

      - name: ACI scale and platform check
        run: aci scale-check --scratch-root workspace/ci-scale-check

      - name: Build wheel and verify in clean venv
        run: |
          pip install build
          python shared/tools/aci_verify_distribution.py --kind wheel --outdir dist-ci/

      - name: Build sdist and verify in clean venv
        run: |
          pip install build
          python shared/tools/aci_verify_distribution.py --kind sdist --outdir dist-ci/

      - name: Verify sample report assets are in sync
        run: |
          python - <<'EOF'
          import hashlib, sys
          from pathlib import Path
          src = Path("shared/report/examples")
          pkg = Path("shared/python/package_assets/report/examples")
          def sha(p): return hashlib.sha256(p.read_bytes()).hexdigest()
          errors = []
          for f in src.iterdir():
              mirror = pkg / f.name
              if not mirror.exists():
                  errors.append(f"missing in package_assets: {f.name}")
              elif sha(f) != sha(mirror):
                  errors.append(f"content differs: {f.name}")
          if errors:
              print("Sample report sync errors:"); [print(f"  {e}") for e in errors]; sys.exit(1)
          print(f"OK: {len(list(src.iterdir()))} sample report(s) in sync")
          EOF

      - name: ACI self-scan (informational)
        run: |
          aci scan \
            --target shared/python/ \
            --profile full \
            --domain core-only \
            --severity-threshold critical \
            --no-external-analyzers \
            --output-format json
        continue-on-error: true

  codeql-e2e:
    # codeql is heavy (a ~600 MB bundle plus a per-language database build), so it
    # gets its own Linux job that installs the bundle and runs only the codeql
    # lane e2e — proving the database-build -> analyze -> SARIF -> normalized
    # finding pipeline end-to-end rather than only at the SARIF-parser level.
    name: codeql lane (live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          pip install setuptools==79.0.1
          pip install -e .
          # The codeql lane e2e is driven by pytest; this job does not install
          # the full multi-analyzer set, only the pinned dev tools that include
          # pytest (without it the step exits 127 -- command not found).
          pip install -r requirements-dev-analyzers.txt
      - name: Install codeql bundle
        run: |
          curl -sSL -o "$HOME/codeql-bundle.tar.gz" https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.25.6/codeql-bundle-linux64.tar.gz
          tar -xzf "$HOME/codeql-bundle.tar.gz" -C "$HOME"
          echo "$HOME/codeql" >> "$GITHUB_PATH"
      - name: Run codeql lane e2e
        run: pytest shared/tests/test_aci_external_analyzer_e2e.py -k codeql -v

  platform-smoke:
    name: Platform verification (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and analyzer dependencies
        run: |
          pip install setuptools==79.0.1
          pip install -e .
          pip install -r requirements-dev-analyzers.txt
          pip install build

      - name: Design methodology ops check
        run: python shared/tools/aci_design_methodology_check.py --root .

      - name: Run test suite
        run: pytest shared/tests/ -v

      - name: Lint (ruff)
        run: ruff check shared/python/ shared/tests/ shared/tools/

      - name: Type check (mypy)
        run: mypy shared/python/

      - name: ACI automation smoke
        run: aci automation-smoke

      - name: ACI self-audit surface check
        run: aci self-audit-check

      - name: Build wheel and verify in clean venv
        run: python shared/tools/aci_verify_distribution.py --kind wheel --outdir dist-ci/

      - name: Build sdist and verify in clean venv
        run: python shared/tools/aci_verify_distribution.py --kind sdist --outdir dist-ci/

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-linux, platform-smoke]
    permissions:
      contents: read
      id-token: write  # OIDC token for PyPI Trusted Publishing (no long-lived secrets)

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install setuptools==79.0.1
          pip install -e .

      - name: Verify installed package (release gate lane)
        run: aci installed-package-check

      - name: Build distribution artifacts
        run: |
          pip install build
          python -m build

      - name: Verify wheel and sdist were produced
        run: |
          python - <<'EOF'
          import tomllib
          import re
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          distribution_name = str(data.get("project", {}).get("name") or "aci")
          artifact_prefix = re.sub(r"[-_.]+", "_", distribution_name).lower()
          dist = Path("dist")
          wheels = list(dist.glob(f"{artifact_prefix}-*.whl"))
          sdists = list(dist.glob(f"{artifact_prefix}-*.tar.gz"))
          assert wheels, f"No wheel found in {dist}: {list(dist.iterdir())}"
          assert sdists, f"No sdist found in {dist}: {list(dist.iterdir())}"
          print(f"wheel: {wheels[-1].name}")
          print(f"sdist: {sdists[-1].name}")
          EOF

      - name: Record build provenance (T56)
        # Provenance posture:
        #   current:  unsigned artifacts; provenance recorded as CI step output only.
        #   intent:   PyPI Trusted Publisher (OIDC via GitHub Actions) — no long-lived secrets.
        #   future:   Sigstore/Cosign artifact signing for supply-chain attestation.
        #   not-used: PGP/GPG signing (deprecated on PyPI).
        run: |
          python - <<'EOF'
          import json, sys
          from datetime import datetime, UTC
          sha = "${{ github.sha }}"
          ref = "${{ github.ref_name }}"
          py = sys.version.split()[0]
          provenance = {
            "tool": "aci",
            "version": ref,
            "commit_sha": sha,
            "build_ref": ref,
            "python_version": py,
            "built_at": datetime.now(UTC).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "signing_posture": "unsigned",
            "signing_intent": "pypi-trusted-publisher-oidc",
          }
          print(json.dumps(provenance, indent=2))
          EOF

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Requires a one-time PyPI-side Trusted Publisher registration for this
        # repository + workflow before the first real release:
        #   https://docs.pypi.org/trusted-publishers/
        # No API token is stored — authentication is via the job's OIDC id-token.
        # Runs only on v* tag pushes (the release-gate `if` above).
        uses: pypa/gh-action-pypi-publish@release/v1
